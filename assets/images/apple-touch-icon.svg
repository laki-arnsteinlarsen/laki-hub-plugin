<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Square navy background (LAKI primary) — iOS rounder corners automatisk -->
  <rect width="32" height="32" fill="#1E3A5F"/>

  <!-- Volcano body -->
  <polygon points="16,9 27,28 5,28" fill="#334155"/>

  <!-- Lava streaks -->
  <path d="M16,9 L11,20 L10,28" stroke="#f97316" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M16,9 L20,20 L21,28" stroke="#ef4444" stroke-width="1.0" fill="none" opacity="0.5"/>

  <!-- Crater rim -->
  <ellipse cx="16" cy="9.5" rx="3.8" ry="1.6" fill="#1e293b"/>

  <!-- Lava glow (statisk — ingen animasjon for apple-touch-icon) -->
  <ellipse cx="16" cy="9.5" rx="3" ry="1.2" fill="#f97316"/>
  <ellipse cx="16" cy="9.5" rx="1.5" ry="0.7" fill="#fbbf24"/>
</svg>
