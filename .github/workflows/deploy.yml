name: Deploy Edifice Plugin

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip plugin
        run: |
          zip -r edifice.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "*.command"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 178.105.42.193 >> ~/.ssh/known_hosts

      - name: Upload zip to server
        run: |
          scp -i ~/.ssh/id_ed25519 edifice.zip arnstein@178.105.42.193:/tmp/edifice.zip

      - name: Deploy directly into plugin folder
        run: |
          ssh -i ~/.ssh/id_ed25519 arnstein@178.105.42.193 << 'EOF'
            CONTAINER="wordpress-l78r6g3o96gmke1f64raie3e"
            PLUGINS="/var/www/html/wp-content/plugins"

            # Copy zip into container
            docker cp /tmp/edifice.zip $CONTAINER:/tmp/edifice.zip

            # Remove old folders, extract zip using PHP ZipArchive (no unzip needed)
            docker exec $CONTAINER bash -c "
              rm -rf $PLUGINS/laki-hub $PLUGINS/edifice
              mkdir -p $PLUGINS/edifice
              php -r \"
                \\\$z = new ZipArchive();
                \\\$z->open('/tmp/edifice.zip');
                \\\$z->extractTo('$PLUGINS/edifice');
                \\\$z->close();
                echo 'Extracted OK\n';
              \"
            "

            # Find WP-CLI and activate plugin
            docker exec $CONTAINER bash -c "
              WPCLI=\$(find /var/www/html -name 'wp-cli.phar' 2>/dev/null | head -1)
              if [ -n \"\$WPCLI\" ]; then
                cd /var/www/html
                php \$WPCLI --allow-root plugin activate edifice && echo 'Plugin activated via WP-CLI'
              else
                echo 'WP-CLI not found, activating via MySQL...'
                # Get current active_plugins, add edifice/edifice.php
                mysql -u\$WORDPRESS_DB_USER -p\$WORDPRESS_DB_PASSWORD -h\$WORDPRESS_DB_HOST \$WORDPRESS_DB_NAME -e \"
                  UPDATE wp_options SET option_value = REPLACE(
                    REPLACE(option_value, 'laki-hub/laki-hub.php', 'edifice/edifice.php'),
                    's:26:\\\"laki-hub/laki-hub.php\\\"',
                    's:22:\\\"edifice/edifice.php\\\"'
                  ) WHERE option_name = 'active_plugins';
                \" && echo 'active_plugins updated via MySQL'
              fi
              echo '=== Active plugins in DB ==='
              mysql -u\$WORDPRESS_DB_USER -p\$WORDPRESS_DB_PASSWORD -h\$WORDPRESS_DB_HOST \$WORDPRESS_DB_NAME -se 'SELECT option_value FROM wp_options WHERE option_name=\"active_plugins\";'
            "

            rm -f /tmp/edifice.zip
            docker exec $CONTAINER rm -f /tmp/edifice.zip
            echo "✅ Edifice deployet OK"
          EOF
