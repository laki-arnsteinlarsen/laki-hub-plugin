name: Deploy Edifice Plugin

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip plugin
        run: |
          zip -r edifice.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "*.command"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 178.105.42.193 >> ~/.ssh/known_hosts

      - name: Upload zip to server
        run: |
          scp -i ~/.ssh/id_ed25519 edifice.zip arnstein@178.105.42.193:/tmp/edifice.zip

      - name: Deploy directly into plugin folder
        run: |
          ssh -i ~/.ssh/id_ed25519 arnstein@178.105.42.193 << 'EOF'
            CONTAINER="wordpress-l78r6g3o96gmke1f64raie3e"
            PLUGINS="/var/www/html/wp-content/plugins"

            # Copy zip into container
            docker cp /tmp/edifice.zip $CONTAINER:/tmp/edifice.zip

            # Remove old plugin folders, create fresh edifice folder, extract zip
            docker exec $CONTAINER bash -c "
              rm -rf $PLUGINS/laki-hub
              rm -rf $PLUGINS/edifice
              mkdir -p $PLUGINS/edifice
              cd $PLUGINS/edifice && unzip -o /tmp/edifice.zip
              rm /tmp/edifice.zip
            "

            # Activate plugin via WP-CLI
            docker exec $CONTAINER bash -c "
              cd /var/www/html
              php wp-cli.phar --allow-root plugin activate edifice
              echo '=== Active plugins ==='
              php wp-cli.phar --allow-root plugin list --status=active
            "

            rm -f /tmp/edifice.zip
            echo "✅ Edifice deployet OK"
          EOF
