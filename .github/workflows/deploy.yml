name: Deploy Edifice Plugin

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip plugin
        run: |
          zip -r edifice.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "*.command"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 178.105.42.193 >> ~/.ssh/known_hosts

      - name: Upload zip to server
        run: |
          scp -i ~/.ssh/id_ed25519 edifice.zip arnstein@178.105.42.193:/tmp/edifice.zip

      - name: Deploy and activate plugin
        run: |
          ssh -i ~/.ssh/id_ed25519 arnstein@178.105.42.193 << 'EOF'
            CONTAINER="wordpress-l78r6g3o96gmke1f64raie3e"
            PLUGINS="/var/www/html/wp-content/plugins"

            # Copy zip into container
            docker cp /tmp/edifice.zip $CONTAINER:/tmp/edifice.zip

            # Extract zip into plugin folder
            docker exec $CONTAINER bash -c "
              rm -rf $PLUGINS/laki-hub $PLUGINS/edifice
              mkdir -p $PLUGINS/edifice
              php -r \"\\\$z=new ZipArchive();\\\$z->open('/tmp/edifice.zip');\\\$z->extractTo('$PLUGINS/edifice');\\\$z->close();echo 'Extracted OK\n';\"
              rm -f /tmp/edifice.zip
            "

            # Activate plugin via WordPress PHP bootstrap
            docker exec $CONTAINER php -r "
              \$_SERVER['HTTP_HOST']='edifice.arnsteinlarsen.no';
              \$_SERVER['REQUEST_URI']='/';
              define('ABSPATH','/var/www/html/');
              require_once('/var/www/html/wp-load.php');
              \$slug='edifice/edifice.php';
              if(!is_plugin_active(\$slug)){
                \$r=activate_plugin(\$slug);
                echo is_wp_error(\$r)?'ERROR: '.\$r->get_error_message().'\n':'Plugin activated OK\n';
              } else {
                echo 'Already active\n';
              }
              echo 'Active plugins:\n';
              foreach(get_option('active_plugins') as \$p) echo '  '.\$p.'\n';
            "

            rm -f /tmp/edifice.zip
            echo "✅ Edifice deployet OK"
          EOF
